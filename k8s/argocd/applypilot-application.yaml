apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: applypilot
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-github-username/job-application-copilot.git
    targetRevision: main
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: applypilot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
