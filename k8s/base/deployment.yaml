apiVersion: apps/v1
kind: Deployment
metadata:
  name: applypilot
  namespace: applypilot
  labels:
    app.kubernetes.io/name: applypilot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: applypilot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: applypilot
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: applypilot
          image: ghcr.io/your-github-username/job-application-copilot:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8787
          envFrom:
            - configMapRef:
                name: applypilot-config
            - secretRef:
                name: applypilot-secrets
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: applypilot-data
