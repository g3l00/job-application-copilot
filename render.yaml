services:
  - type: web
    name: applypilot-private
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8787
      - key: APP_USERNAME
        value: applypilot
      - key: APP_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: applypilot-db
          property: connectionString
      - key: GMAIL_QUERY
        value: from:(jobalerts-noreply@linkedin.com) newer_than:30d
      - key: GMAIL_MAX_RESULTS
        value: 10

databases:
  - name: applypilot-db
    plan: free
