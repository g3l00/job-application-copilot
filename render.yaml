services:
  - type: web
    name: applypilot-private
    env: docker
    plan: starter
    autoDeploy: true
    disk:
      name: applypilot-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 8787
      - key: APP_USERNAME
        value: applypilot
      - key: APP_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GMAIL_QUERY
        value: from:linkedin.com newer_than:2d
      - key: GMAIL_MAX_RESULTS
        value: 10
