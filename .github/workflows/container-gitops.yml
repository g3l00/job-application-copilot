name: Build Image and Update GitOps Tag

on:
  push:
    branches:
      - main
    paths-ignore:
      - "k8s/base/kustomization.yaml"
      - "README.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/job-application-copilot

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: image
        run: echo "tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            OCI_SOURCE=https://github.com/${{ github.repository }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Update Kubernetes image tag
        run: |
          sed -i "s|newName: .*|newName: ${IMAGE_NAME}|" k8s/base/kustomization.yaml
          sed -i "s|newTag: .*|newTag: ${{ steps.image.outputs.tag }}|" k8s/base/kustomization.yaml

      - name: Commit GitOps image tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/base/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No GitOps tag change to commit."
            exit 0
          fi
          git commit -m "Deploy ApplyPilot ${{ steps.image.outputs.tag }}"
          git push
